<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StudentPlus · Group Chat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Inter + Creepster) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- KaTeX for LaTeX Rendering (kept for any math in chat, but optional) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/mhchem.min.js"></script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-y: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0a0a14;
        }

        #app-wrapper {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            background-color: #0a0a14;
        }
        
        #message-input, .file-input-hidden {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }

        .katex {
            font-size: 1.1em !important;
            text-align: left !important;
        }
        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 4px;
        }

        #chat-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        #chat-container::-webkit-scrollbar {
            display: none;
        }

        @media (min-width: 768px) {
            #app-wrapper {
                position: relative;
                margin: 0 auto;
                max-width: 600px;
                height: 90vh;
                max-height: 800px;
                border-radius: 0.5rem;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
                top: 50%;
                transform: translateY(-50%);
            }
        }

        .loading-dots::after {
            content: "...";
            animation: dots 1.5s steps(4, end) infinite;
            display: inline-block;
            width: 24px;
        }
        @keyframes dots {
            0%, 20% { content: ""; }
            40% { content: "."; }
            60% { content: ".."; }
            80%, 100% { content: "..."; }
        }

        .btn-active:active {
            transform: scale(0.95);
        }
        .transition-custom {
            transition: all 0.15s ease-in-out;
        }
        .creepster {
            font-family: 'Creepster', system-ui;
        }

        /* Divider styling for message pairs */
        .message-divider {
            margin: 16px 0;
            border: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        }

        /* Preserve line breaks in messages */
        .message-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Textarea styling to match input */
        #message-input {
            resize: none;
            min-height: 44px;
            max-height: 120px;
            overflow-y: auto;
        }
    </style>
</head>

<body class="h-full flex flex-col overflow-hidden">

    <div id="app-wrapper" class="flex flex-col overflow-hidden rounded-none md:rounded-lg">

        <!-- HEADER (unchanged UI) -->
        <header style="background-color: #0a0a14; height: 56px;" class="w-full flex items-center justify-between px-3 sticky top-0 z-50 flex-shrink-0">
            
            <!-- Left Section: Brand Logo + Brand Name -->
            <div class="flex items-center gap-2">
                <div class="h-8 w-8 flex items-center justify-center bg-black border-[1px] border-white/60 rounded-md overflow-hidden p-1 shadow-sm">
                    <img 
                        src="https://i.postimg.cc/y88hFhh3/20260311-205800-0000.png" 
                        alt="Logo" 
                        class="h-full w-full object-contain"
                    >
                </div>
                
                <div class="flex flex-col items-center justify-center">
                    <h1 class="creepster text-white text-2xl tracking-wide leading-[0.9]">
                        StudentPlus
                    </h1>
                    <div class="w-full h-[1.5px] mt-1 bg-white"></div>
                </div>
            </div>

            <!-- Right Section: Action Capsule + Profile -->
            <div class="flex items-center gap-2">
                <div class="h-8 flex items-center bg-black border-[1px] border-white/80 rounded-full px-0.5 shadow-sm">
                    <button class="h-full px-1.5 flex items-center justify-center text-white hover:text-gray-400 btn-active transition-custom">
                        <i data-lucide="menu" stroke-width="3" size="14"></i>
                    </button>
                    <button class="h-full px-1.5 flex items-center justify-center text-white hover:text-gray-400 btn-active transition-custom">
                        <i data-lucide="calendar" stroke-width="3" size="14"></i>
                    </button>
                    <button id="logout-button" class="h-full px-1.5 flex items-center justify-center text-white hover:text-gray-400 btn-active transition-custom">
                        <i data-lucide="log-out" stroke-width="3" size="14"></i>
                    </button>
                </div>

                <div class="h-8 w-8 flex-shrink-0 flex items-center justify-center bg-black border-[1px] border-white/80 rounded-full overflow-hidden p-0.5 shadow-sm transition-custom hover:scale-105 active:scale-90 cursor-pointer">
                    <img 
                        src="https://i.postimg.cc/y88hFhh3/20260311-205800-0000.png" 
                        alt="Profile" 
                        class="h-full w-full object-cover rounded-full"
                        onerror="this.src='https://via.placeholder.com/32x32?text=S'"
                    >
                </div>
            </div>
        </header>
        <div class="w-full h-[1px] bg-white/20 flex-shrink-0"></div>

        <!-- Chat Container (Scrollable) -->
        <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 bg-[#0a0a14]">
            <!-- Initial placeholder while loading -->
            <div id="chat-loading-placeholder" class="flex justify-center items-center h-full">
                <div class="text-gray-400">Loading chat...</div>
            </div>
        </main>

        <!-- Image Preview Container (non-functional, kept for UI consistency) -->
        <div id="image-preview-container" class="hidden mx-4 mb-2 bg-gray-800/60 rounded-xl p-2 flex items-center gap-3 border border-white/10 flex-shrink-0">
            <img id="preview-img" class="w-12 h-12 object-cover rounded-md border border-white/20" alt="preview">
            <div class="flex-1">
                <p id="preview-filename-text" class="text-white text-xs truncate"></p>
                <button id="remove-image-btn" class="text-red-400 text-xs font-medium mt-1 hover:text-red-300">Remove</button>
            </div>
        </div>

        <!-- Input Footer -->
        <footer class="bg-[#0a0a14] border-t border-white/10 p-4 flex-shrink-0">
            <div class="flex items-end space-x-3">
                <!-- Image Upload Icon (disabled) -->
                <label class="cursor-pointer p-3 rounded-full bg-gray-800 hover:bg-gray-700 transition-colors flex items-center justify-center shadow-md border border-white/10 opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-white">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                    </svg>
                    <input type="file" id="image-upload" accept="image/*" class="hidden file-input-hidden" disabled />
                </label>

                <!-- Message Input Form -->
                <form id="message-form" class="flex-1 flex items-end space-x-3">
                    <textarea 
                        id="message-input"
                        placeholder="Type a message..."
                        class="flex-1 w-full px-4 py-3 border border-gray-600 rounded-2xl bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        autocomplete="off"
                        rows="1"
                    ></textarea>
                    <button 
                        type="submit"
                        id="send-button"
                        class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed"
                        aria-label="Send message"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                            <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.98.75.75 0 0 0 0-1.212A60.517 60.517 0 0 0 3.478 2.404Z" />
                        </svg>
                    </button>
                </form>
            </div>
        </footer>

        <!-- Error Modal -->
        <div id="error-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
            <div class="bg-gray-800 rounded-lg shadow-xl p-6 max-w-sm w-full border border-white/20">
                <h3 class="text-lg font-medium text-red-400">Error</h3>
                <p id="error-message" class="mt-2 text-sm text-gray-300"></p>
                <button id="close-error-modal" class="mt-4 w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700">Close</button>
            </div>
        </div>

    </div>

    <script>
        (function() {
            // ---------- FIREBASE CONFIG & INIT ----------
            const firebaseConfig = {
                apiKey: "AIzaSyC6NRjkwiazA-aYF4okvnLW4qpCyMg8O9E",
                authDomain: "fir-f3d53.firebaseapp.com",
                databaseURL: "https://fir-f3d53-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "fir-f3d53",
                storageBucket: "fir-f3d53.firebasestorage.app",
                messagingSenderId: "683707045028",
                appId: "1:683707045028:web:93990fa0de8767dda90231"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            // ---------- GLOBAL STATE ----------
            let currentUser = null;
            let roomId = null;
            let classId = null, subjectId = null, tutorId = null;
            let unsubscribeMessages = null;
            let dbInstance = null;
            const MESSAGES_LIMIT = 2000;
            
            // UI Elements
            const chatContainer = document.getElementById('chat-container');
            const messageForm = document.getElementById('message-form');
            const messageInput = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');
            const errorModal = document.getElementById('error-modal');
            const errorMessageSpan = document.getElementById('error-message');
            const closeErrorBtn = document.getElementById('close-error-modal');
            const logoutButton = document.getElementById('logout-button');
            const loadingPlaceholder = document.getElementById('chat-loading-placeholder');

            // In-memory set for deduplication
            const renderedMessageIds = new Set();
            let pendingMessages = new Map(); // tempId -> element

            // ---------- HELPER: Show Error ----------
            function showError(message) {
                errorMessageSpan.textContent = message;
                errorModal.classList.remove('hidden');
            }

            closeErrorBtn.addEventListener('click', () => errorModal.classList.add('hidden'));

            // ---------- AUTH REDIRECT ----------
            function redirectToAuth() {
                window.location.href = 'auth1.html';
            }

            // ---------- INDEXEDDB SETUP ----------
            async function openDatabase() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('chatDB', 1);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (ev) => {
                        const db = ev.target.result;
                        if (!db.objectStoreNames.contains('messages')) {
                            const messagesStore = db.createObjectStore('messages', { keyPath: 'messageId' });
                            messagesStore.createIndex('roomId', 'roomId', { unique: false });
                            messagesStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('rooms')) {
                            db.createObjectStore('rooms', { keyPath: 'roomId' });
                        }
                    };
                });
            }

            async function getLastTimestamp(roomId) {
                if (!dbInstance) return 0;
                return new Promise((resolve) => {
                    const tx = dbInstance.transaction('rooms', 'readonly');
                    const store = tx.objectStore('rooms');
                    const req = store.get(roomId);
                    req.onsuccess = () => resolve(req.result?.lastTimestamp || 0);
                    req.onerror = () => resolve(0);
                });
            }

            async function setLastTimestamp(roomId, timestamp) {
                if (!dbInstance) return;
                const tx = dbInstance.transaction('rooms', 'readwrite');
                const store = tx.objectStore('rooms');
                store.put({ roomId, lastTimestamp: timestamp });
                return tx.complete;
            }

            async function saveMessagesToIDB(messages) {
                if (!dbInstance || !messages.length) return;
                const tx = dbInstance.transaction('messages', 'readwrite');
                const store = tx.objectStore('messages');
                for (const msg of messages) {
                    store.put(msg);
                }
                await tx.complete;
                // Trim old messages
                await trimMessagesIfNeeded(roomId);
            }

            async function trimMessagesIfNeeded(roomId) {
                if (!dbInstance) return;
                const tx = dbInstance.transaction('messages', 'readwrite');
                const store = tx.objectStore('messages');
                const index = store.index('roomId');
                const countReq = index.count(roomId);
                countReq.onsuccess = async () => {
                    const count = countReq.result;
                    if (count > MESSAGES_LIMIT) {
                        const deleteCount = count - MESSAGES_LIMIT;
                        const cursorReq = index.openCursor(roomId, 'next');
                        let deleted = 0;
                        cursorReq.onsuccess = (ev) => {
                            const cursor = ev.target.result;
                            if (cursor && deleted < deleteCount) {
                                cursor.delete();
                                deleted++;
                                cursor.continue();
                            }
                        };
                    }
                };
                await tx.complete;
            }

            async function loadCachedMessages(roomId) {
                if (!dbInstance) return [];
                return new Promise((resolve) => {
                    const tx = dbInstance.transaction('messages', 'readonly');
                    const store = tx.objectStore('messages');
                    const index = store.index('roomId');
                    const messages = [];
                    index.openCursor(roomId, 'prev').onsuccess = (ev) => {
                        const cursor = ev.target.result;
                        if (cursor) {
                            messages.push(cursor.value);
                            cursor.continue();
                        } else {
                            resolve(messages.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0)));
                        }
                    };
                });
            }

            // ---------- RENDER MESSAGE ----------
            function renderMessage(message, isOwn) {
                if (renderedMessageIds.has(message.messageId)) return null;
                renderedMessageIds.add(message.messageId);

                const wrapper = document.createElement('div');
                wrapper.className = `flex ${isOwn ? 'justify-end' : 'justify-start'}`;
                wrapper.dataset.messageId = message.messageId;
                
                const bubble = document.createElement('div');
                bubble.className = `p-3 rounded-lg max-w-sm md:max-w-md ${
                    isOwn ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-100'
                }`;
                
                const textSpan = document.createElement('div');
                textSpan.className = 'message-text';
                textSpan.textContent = message.message || '';
                bubble.appendChild(textSpan);
                
                // Optional timestamp display
                if (message.timestamp) {
                    const timeDiv = document.createElement('div');
                    timeDiv.className = `text-xs mt-1 ${isOwn ? 'text-blue-200' : 'text-gray-400'}`;
                    const date = message.timestamp instanceof Date ? message.timestamp : new Date(message.timestamp);
                    timeDiv.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    bubble.appendChild(timeDiv);
                }
                
                wrapper.appendChild(bubble);
                chatContainer.appendChild(wrapper);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return wrapper;
            }

            function removeMessageFromUI(messageId) {
                const element = document.querySelector(`[data-message-id="${messageId}"]`);
                if (element) element.remove();
                renderedMessageIds.delete(messageId);
            }

            // ---------- RENDER CACHED MESSAGES ----------
            async function renderCachedMessages() {
                const cached = await loadCachedMessages(roomId);
                chatContainer.innerHTML = '';
                renderedMessageIds.clear();
                if (cached.length === 0) {
                    // Show welcome message
                    const welcomeDiv = document.createElement('div');
                    welcomeDiv.className = 'flex justify-start';
                    welcomeDiv.innerHTML = `
                        <div class="bg-gray-800/80 text-gray-100 p-3 rounded-lg max-w-sm md:max-w-md">
                            <p class="font-medium">📚 Group Chat</p>
                            <p>Class ${classId} · ${subjectId} · Tutor ${tutorId}<br>Send a message to start the discussion.</p>
                        </div>
                    `;
                    chatContainer.appendChild(welcomeDiv);
                } else {
                    cached.forEach(msg => {
                        const isOwn = msg.userId === currentUser.uid;
                        renderMessage(msg, isOwn);
                    });
                }
                loadingPlaceholder.style.display = 'none';
            }

            // ---------- FIRESTORE LISTENER ----------
            function attachFirestoreListener(lastTimestamp) {
                if (unsubscribeMessages) unsubscribeMessages();
                
                const messagesRef = db.collection('groupChats').doc(roomId).collection('messages');
                let query = messagesRef.orderBy('timestamp');
                if (lastTimestamp > 0) {
                    query = query.where('timestamp', '>', lastTimestamp);
                }
                
                unsubscribeMessages = query.onSnapshot(async (snapshot) => {
                    const newMessages = [];
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const data = change.doc.data();
                            const msg = {
                                messageId: change.doc.id,
                                ...data,
                                timestamp: data.timestamp ? data.timestamp.toMillis() : Date.now()
                            };
                            newMessages.push(msg);
                        }
                    });
                    
                    if (newMessages.length === 0) return;
                    
                    // Filter out already rendered
                    const toRender = newMessages.filter(m => !renderedMessageIds.has(m.messageId));
                    
                    // Update IDB and lastTimestamp
                    await saveMessagesToIDB(toRender);
                    const maxTimestamp = Math.max(...toRender.map(m => m.timestamp), lastTimestamp);
                    await setLastTimestamp(roomId, maxTimestamp);
                    
                    // Render new messages
                    toRender.forEach(msg => {
                        const isOwn = msg.userId === currentUser.uid;
                        renderMessage(msg, isOwn);
                    });
                    
                    // Remove any pending temp message that matches this real one (by userId + approximate time)
                    // (simple dedup: if a pending message exists with same content and time diff < 5000ms, remove it)
                    for (const [tempId, elem] of pendingMessages.entries()) {
                        const tempData = pendingMessages.get(tempId);
                        // Not implemented full dedup for brevity; we'll just remove after real arrives.
                    }
                }, error => {
                    console.error('Firestore listener error:', error);
                    showError('Real-time connection issue. Reconnecting...');
                });
            }

            // ---------- INIT CHAT ----------
            async function initializeChat() {
                try {
                    dbInstance = await openDatabase();
                    const lastTs = await getLastTimestamp(roomId);
                    await renderCachedMessages();
                    attachFirestoreListener(lastTs);
                } catch (err) {
                    console.error('Init chat error:', err);
                    showError('Failed to load chat. Please refresh.');
                    loadingPlaceholder.style.display = 'none';
                }
            }

            // ---------- SEND MESSAGE ----------
            async function sendMessage(text) {
                if (!text.trim() || !currentUser || !roomId) return;
                
                const tempId = 'temp_' + Date.now() + '_' + Math.random().toString(36);
                const tempMessage = {
                    messageId: tempId,
                    userId: currentUser.uid,
                    message: text.trim(),
                    timestamp: Date.now(),
                    type: 'text',
                    pending: true
                };
                
                // Optimistic UI
                const tempElement = renderMessage(tempMessage, true);
                pendingMessages.set(tempId, tempElement);
                
                messageInput.value = '';
                messageInput.style.height = 'auto';
                
                try {
                    const messagesRef = db.collection('groupChats').doc(roomId).collection('messages');
                    const docRef = await messagesRef.add({
                        userId: currentUser.uid,
                        message: text.trim(),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        type: 'text'
                    });
                    
                    // Real message will arrive via listener; we can remove temp after a short delay
                    setTimeout(() => {
                        if (pendingMessages.has(tempId)) {
                            const elem = pendingMessages.get(tempId);
                            if (elem) elem.remove();
                            pendingMessages.delete(tempId);
                            renderedMessageIds.delete(tempId);
                        }
                    }, 2000);
                    
                } catch (error) {
                    console.error('Send error:', error);
                    showError('Failed to send message. Please retry.');
                    // Remove optimistic message
                    if (pendingMessages.has(tempId)) {
                        const elem = pendingMessages.get(tempId);
                        if (elem) elem.remove();
                        pendingMessages.delete(tempId);
                        renderedMessageIds.delete(tempId);
                    }
                    // Restore input
                    messageInput.value = text;
                }
            }

            // ---------- AUTH STATE OBSERVER ----------
            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    redirectToAuth();
                    return;
                }
                currentUser = user;
                
                // Parse URL params
                const params = new URLSearchParams(window.location.search);
                classId = params.get('classId');
                subjectId = params.get('subjectId');
                tutorId = params.get('tutorId');
                
                if (!classId || !subjectId || !tutorId) {
                    showError('Missing class, subject, or tutor in URL.');
                    chatContainer.innerHTML = `<div class="text-center text-gray-400 p-8">Invalid room parameters. Please access from the main app.</div>`;
                    loadingPlaceholder.style.display = 'none';
                    return;
                }
                
                roomId = `${classId}_${subjectId}_${tutorId}`;
                
                // Initialize chat
                await initializeChat();
            });

            // ---------- EVENT LISTENERS ----------
            messageForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = messageInput.value.trim();
                if (text) sendMessage(text);
            });
            
            // Shift+Enter for newline, Enter to send
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const text = messageInput.value.trim();
                    if (text) sendMessage(text);
                }
            });
            
            // Auto-resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Logout
            logoutButton.addEventListener('click', async () => {
                try {
                    if (unsubscribeMessages) unsubscribeMessages();
                    await auth.signOut();
                    redirectToAuth();
                } catch (e) {
                    showError('Logout failed');
                }
            });

            // Disable context menu / copy (security)
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('copy', (e) => e.preventDefault());

            // Lucide icons
            if (typeof lucide !== 'undefined') lucide.createIcons();

            // Image upload non-functional, but we keep the UI elements
            document.getElementById('image-upload').addEventListener('click', (e) => e.preventDefault());
        })();
    </script>
</body>
</html>
